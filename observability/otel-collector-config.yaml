receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  otlphttp/phoenix:
    endpoint: http://phoenix:6006
    tls:
      insecure: true
    sending_queue:
      enabled: true
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 2s
      max_interval: 30s
      max_elapsed_time: 300s
  debug:
    verbosity: detailed

# NOTE: Phoenix Docker image serves OTLP on port 6006 (same as UI).
# Unlike standard OTLP ports (4317/4318), Phoenix does NOT expose those.
# The endpoint above is correct. Do not change to 4317/4318.

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/phoenix, debug]
